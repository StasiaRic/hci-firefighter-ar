    <section class="story-content">
      <p class="story-text">
        Hallo, ich bin Bob, 23 Jahre Feuerwehrmann in St. Gallen. In einer Nacht war alles vom Rauch verschluckt, und ohne diese Lampe hätte ich den Weg nie gefunden.<br><br>Ihr Licht hat Leben gerettet - Heute gehört sie dir.
      </p>
      
      <div class="story-character-image">
        <img src="assets/images/Feuerwehrman1.png" alt="Bob erzählt seine Geschichte" />
      </div>

      <button class="speak-button" onclick="goToPage('equipment-unlock.html')">
        Weiter
      </button>
    </section>

    <!-- Home Modal -->
    <div id="homeModal" class="modal-overlay" onclick="closeHomeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-option" onclick="closeHomeModal()">Fortsetzen</button>
        <button class="modal-option modal-option-end" onclick="goToPage('game-end.html')">Beenden</button>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay" onclick="closeSettingsModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-option" onclick="closeSettingsModal()">Schliessen</button>
        <button class="modal-option" onclick="goToPage('equipment-overview.html')">Inventar</button>
      </div>
    </div>

  <script src="script.js"></script>
