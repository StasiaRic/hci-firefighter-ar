<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HCI Firefighter AR - Ausrüstung</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-additional.css" />
</head>
<body>
  <main class="phone equipment-counter-screen">
    <header class="top-nav figma-nav">
      <button class="nav-icon-box" onclick="showHomeModal()" aria-label="Home">
        <svg viewBox="0 0 24 24" class="nav-svg" aria-hidden="true" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </button>
      <div class="nav-center-bar"></div>
      <button class="nav-icon-box" onclick="showSettingsModal()" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" class="nav-svg" aria-hidden="true" fill="currentColor">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>
    </header>

    <section class="equipment-counter-content">
      <h1 class="counter-title" id="counterTitle">1 von 4<br>Ausrüstungsobjekten</h1>
      
      <div class="counter-burst-container">
        <div class="golden-burst"></div>
        <div class="equipment-counter-image">
          <img src="assets/images/lampe1.png" alt="Ausrüstung" id="counterImage" />
        </div>
      </div>

      <button class="counter-button" id="nextButton" onclick="goToNextScreen()">
        Ausrüstung anziehen
      </button>
    </section>

    <!-- Home Modal -->
    <div id="homeModal" class="modal-overlay" onclick="closeHomeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-option" onclick="closeHomeModal()">Fortsetzen</button>
        <button class="modal-option modal-option-end" onclick="goToPage('game-end.html')">Beenden</button>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay" onclick="closeSettingsModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-option" onclick="closeSettingsModal()">Schliessen</button>
        <button class="modal-option" onclick="goToPage('equipment-overview.html')">Inventar</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
      // Update counter based on URL parameter
      const urlParams = new URLSearchParams(window.location.search);
      const count = urlParams.get('count') || '1';
      document.getElementById('counterTitle').innerHTML = `${count} von 4<br>Ausrüstungsobjekten`;
      
      // Store count in localStorage for continue-or-end screen
      localStorage.setItem('equipmentCount', count);
      
      // Map of items to images
      const itemImages = {
        '1': 'assets/images/lampe1.png',
        '2': 'assets/images/lampe2.png',
        '3': 'assets/images/helm1.png',
        '4': 'assets/images/helm2.png'
      };
      
      // Update the image based on item number
      const img = document.getElementById('counterImage');
      if (img && itemImages[count]) {
        img.src = itemImages[count];
      }
      
      // Function to go to next screen based on count
      function goToNextScreen() {
        if (count === '2') {
          // After Sara (item 2), go directly to equipment overview
          goToPage('equipment-overview.html');
        } else {
          // After Bob (item 1), go to continue-or-end
          goToPage('continue-or-end.html');
        }
      }
    </script>
</body>
</html>
